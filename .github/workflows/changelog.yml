name: Check Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  verify-changelog:
    name: Verify CHANGES.rst Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for CHANGES.rst changes
        id: check_file
        run: |
          # Compare the PR head branch against the base branch
          # Using grep -qi to match CHANGES.rst regardless of case
          if git diff --name-only origin/${{ github.base_ref }}...origin/${{ github.head_ref }} | grep -qi "CHANGES.rst"; then
            echo "Success: CHANGES.rst has been updated."
          else
            echo "Error: No changes detected in CHANGES.rst."
            echo "Please document your changes in the CHANGES.rst file before merging."
            exit 1
          fi
